name: Create Azure DevOps Work Items

on:
  schedule:
    - cron: '7 13 * * *'   # 09:07 EDT (UTC-4) daily; off-the-hour to avoid GitHub schedule congestion
  workflow_dispatch:
    inputs:
      work_date:
        description: 'Date (YYYY-MM-DD). Leave blank to use today (UTC).'
        required: false
        type: string
        default: ''

concurrency:
  group: ado-work-items
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  create-work-items:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for random time
        env:
          WAIT_MAX_MINUTES: ${{ vars.WAIT_MAX_MINUTES }}
        run: python3 scripts/wait_random_time.py

      - name: Resolve work date
        id: date
        run: |
          DATE="${{ github.event.inputs.work_date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          echo "value=$DATE" >> "$GITHUB_OUTPUT"
          echo "Work date: $DATE"

      - name: Create work items and update README
        env:
          ADO_PAT:     ${{ secrets.AZURE_DEVOPS_PAT }}
          WORK_DATE:   ${{ steps.date.outputs.value }}
          ADO_ORG:     ${{ vars.ADO_ORG }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_API_VER: ${{ vars.ADO_API_VER }}
          ADO_EPIC_ID: ${{ vars.ADO_EPIC_ID }}
        run: python3 scripts/manage_workitems.py

      - name: Commit and push README
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit -m "Update work items for ${{ steps.date.outputs.value }}"
          git push origin main
