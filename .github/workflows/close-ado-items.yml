name: Close Azure DevOps Work Items

on:
  schedule:
    - cron: '37 21 * * *'   # 17:37 EDT (UTC-4) daily; off-the-hour to avoid GitHub schedule congestion
  workflow_dispatch:

concurrency:
  group: ado-work-items
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  close-work-items:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for random time
        env:
          WAIT_MAX_MINUTES: ${{ vars.WAIT_MAX_MINUTES }}
        run: python3 scripts/wait_random_time.py

      - name: Close work items and update README
        env:
          ADO_PAT:     ${{ secrets.AZURE_DEVOPS_PAT }}
          ADO_ORG:     ${{ vars.ADO_ORG }}
          ADO_PROJECT: ${{ vars.ADO_PROJECT }}
          ADO_API_VER: ${{ vars.ADO_API_VER }}
        run: python3 scripts/close_workitems.py

      - name: Commit and push README
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet || git commit -m "Close ADO work items for $(date -u +%Y-%m-%d)"
          git push origin main

      - name: Print Summary
        run: echo "Closed active work items for $(date -u +%Y-%m-%d)"
